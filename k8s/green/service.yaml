# ============================================================
# GREEN SERVICE — k8s/green/service.yaml
#
# Identical to blue-service EXCEPT:
# → name: green-service (Ingress switches to this on deploy)
# → selector version: green (routes to green pods only)
#
# ROLLBACK SCENARIO:
# Green is live but something is wrong
# → Change ingress.yaml: name: blue-service
# → kubectl apply → ALB routes back to blue instantly
# → Takes ~30 seconds — zero downtime rollback
# ============================================================

apiVersion: v1
kind: Service

metadata:
  name: green-service
  namespace: default
  labels:
    app: bg-app
    version: green

spec:
  type: ClusterIP

  selector:
    app: bg-app
    version: green      # ← routes to GREEN pods only

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
      